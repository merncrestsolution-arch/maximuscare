<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1152" height="728" viewBox="0 0 1152 728.25">
  <image id="card-background" x="0" y="0" width="1152" height="728.25"
         preserveAspectRatio="xMidYMid meet"
         xlink:href="{{BACKGROUND_IMAGE}}" href="{{BACKGROUND_IMAGE}}"/>

  <g id="patient-fields" font-family="Arial, Helvetica, sans-serif">
    <text x="138" y="235" font-size="22" font-weight="bold" fill="#1a3a6e">{patient.name}</text>
    <text x="312" y="283" font-size="18" fill="#1a3a6e">{patient.id}</text>
    <text x="312" y="333" font-size="18" fill="#1a3a6e">{patient.phone}</text>
    <text x="312" y="383" font-size="18" fill="#1a3a6e">{patient.address}</text>

    <image id="patient-qr" x="908" y="228" width="175" height="175"
           xlink:href="{{QR_PLACEHOLDER}}" href="{{QR_PLACEHOLDER}}"/>

    <text x="1005" y="704" font-size="15" fill="#ffffff">{patient.cardId}</text>
  </g>
</svg>
